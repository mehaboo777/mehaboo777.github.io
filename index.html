<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="introPage">
    <!-- Floating hearts background -->
    <canvas id="bgHearts"></canvas>
    
    <!-- Love envelope animation -->
    <div id="intro" class="intro-container">
        <div id="mainEnvelope" class="envelope" onclick="openLetter()">
            <div class="envelope-seal">❤️</div>
            <div class="envelope-content">
                <p class="envelope-text">Open Your Heartfelt Message</p>
            </div>
            <p class="envelope-tap">✨ Click to Begin ✨</p>
        </div>
    </div>

    <!-- Flash effect on envelope open -->
    <div id="openFlash"></div>

    <!-- Intro scene with story -->
    <div id="introScene" class="intro-scene">
        <div class="intro-card">
            <div class="intro-header">
                <h1 class="intro-title">Hello, My Love ❤️</h1>
                <p class="intro-subtitle">I created something special just for you...</p>
            </div>
            
            <div class="intro-content">
                <div id="daysCounter" class="days-counter"></div>
                <p id="typing" class="typing-text"></p>
            </div>

            <div class="intro-footer">
                <div class="floating-hearts">
                    <span class="heart-icon">❤️</span>
                    <span class="heart-icon">❤️</span>
                    <span class="heart-icon">❤️</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
