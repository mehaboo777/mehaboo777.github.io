<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever & Always ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="foreverPage">
    <canvas id="bgHearts"></canvas>

    <!-- Content -->
    <div class="forever-container">
        <div class="forever-content">
            <h1 class="forever-title">Forever & Always ❤️</h1>
            
            <div class="forever-message">
                <p>No matter what happens...</p>
                <p>No matter where life takes us...</p>
                <p class="highlight-text">I will always choose you.</p>
                <p>Every single time.</p>
            </div>

            <div class="forever-promise">
                <p>✨ You are my forever ✨</p>
            </div>

            <!-- Voice message section -->
            <div class="voice-section">
                <p class="voice-label">Listen to my voice when you miss me 🎵</p>
                <audio controls class="voice-player">
                    <source src="voice.mp3" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
                <p class="voice-note">(A reminder of my love for you)</p>
            </div>

            <!-- Additional hearts -->
            <div class="forever-hearts">
                ❤️ ❤️ ❤️ ❤️ ❤️
            </div>
        </div>
    </div>

    <!-- Floating home button -->
    <a href="home.html" class="float-btn">🏠</a>

    <script src="script.js"></script>
</body>
</html>
