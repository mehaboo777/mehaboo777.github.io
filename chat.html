<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Chat ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="chat-page">

    <div class="chat-container">

    <div class="chat-header">

        <img src="m1.jpeg" class="chat-avatar">

        <div>
            <h2>My Love ❤️</h2>
            <p class="online-status">
                Online
            </p>
        </div>

    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">

        <label for="imageInput" class="chat-action-btn">
            📸
        </label>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            hidden
        >

        <button id="voiceBtn" class="chat-action-btn">
            🎙️
        </button>

        <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
        >

        <button id="sendBtn">
            ❤️
        </button>

    </div>

</div>

    <script type="module" src="chat.js"></script>

</body>

</html>
