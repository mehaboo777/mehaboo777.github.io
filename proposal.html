<body class="proposalPage">

                <h1 class="proposal-title">I Have Something to Ask You...</h1>

                    <p>You came into my life unexpectedly,</p>
                    <p>but you became my everything.</p>
                </div>

                <h2 class="proposal-question">Will you stay with me forever? ❤️</h2>

                <div class="proposal-buttons">
                    <button class="btn-yes" onclick="sayYes()">
                        <span>YES ❤️</span>
                    </button>
                    <button class="btn-yes" onclick="sayYes()">
                        <span>YES ❤️</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Runaway No button -->
    <button id="noBtn" class="btn-no">No 😢</button>

    <!-- Floating home button -->
    <a href="home.html" class="float-btn">🏠</a>
