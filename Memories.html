<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="memoriesPage">

    <!-- HEADER -->

    <section class="memories-header">

        <h1 class="memories-title">
            For My Girl ❤️
        </h1>

        <p class="memories-subtitle">
            A SPECIAL CORNER JUST FOR YOUR BEAUTIFUL MOMENTS
        </p>

    </section>

    <!-- ADD BUTTON -->

    <button id="openUpload" class="add-photo-btn">
        📷 Add Photo
    </button>

    <!-- GALLERY -->

    <section class="polaroid-gallery">

        <div class="polaroid">
            <img src="m1.jpeg">
            <p class="polaroid-caption">
                The way you look at me ✨
            </p>
        </div>

        <div class="polaroid">
            <img src="m2.jpeg">
            <p class="polaroid-caption">
                Holding your hand 🤍
            </p>
        </div>

        <div class="polaroid">
            <img src="m3.jpeg">
            <p class="polaroid-caption">
                The day I realized it's you ❤️
            </p>
        </div>

        <div class="polaroid">
            <img src="m4.jpeg">
            <p class="polaroid-caption">
                Forever moments 💫
            </p>
        </div>

        <div class="polaroid">
            <img src="m5.jpeg">
            <p class="polaroid-caption">
                My beautiful girl 🌸
            </p>
        </div>

        <div class="polaroid">
            <img src="m6.jpeg">
            <p class="polaroid-caption">
                You are my everything 💖
            </p>
        </div>

    </section>

    <!-- VIEWER -->

    <div id="memoryViewer" class="memory-viewer">

        <button id="closeMemory" class="viewer-close">
            ✕
        </button>

        <div class="viewer-content">

            <img id="memoryImage">

            <p id="memoryText" class="viewer-message"></p>

        </div>

    </div>

    <!-- UPLOAD MODAL -->

    <div id="uploadModal" class="upload-modal">

        <div class="upload-box">

            <button id="closeUpload" class="close-upload">
                ✕
            </button>

            <h2>Add a New Memory ❤️</h2>

            <input type="file" id="photoInput" accept="image/*">

            <input
                type="text"
                id="captionInput"
                placeholder="Write something sweet..."
            >

            <button id="saveMemoryBtn">
                Save Memory
            </button>

        </div>

    </div>

    <!-- HOME BUTTON -->

    <a href="home.html" class="float-btn">
        🏠
    </a>

    <script src="script.js"></script>

</body>

</html>
